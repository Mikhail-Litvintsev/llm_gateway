services:
  llm_gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: llm_gateway
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
      - ./docker/php-fpm/pool.d/www.conf:/usr/local/etc/php-fpm.d/www.conf
      - ./docker/php-fpm/pool.d/streaming.conf:/usr/local/etc/php-fpm.d/streaming.conf
    networks:
      - llm_internal
    depends_on:
      - llm_mysql
      - llm_redis
    env_file:
      - .env
    restart: unless-stopped

  llm_nginx:
    image: nginx:alpine
    container_name: llm_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - llm_internal
    depends_on:
      - llm_gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/internal/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  llm_mysql:
    image: mysql:8.4
    container_name: llm_mysql
    ports:
      - "3307:3306"
    volumes:
      - llm_mysql_data:/var/lib/mysql
    networks:
      - llm_internal
    environment:
      MYSQL_DATABASE: llm_gateway
      MYSQL_USER: llm_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    restart: unless-stopped

  llm_redis:
    image: redis:7-alpine
    container_name: llm_redis
    ports:
      - "6381:6379"
    networks:
      - llm_internal
    restart: unless-stopped

  llm_queue_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: llm_queue_worker
    command: php artisan queue:work redis --queue=high,default,low,batch --sleep=3 --tries=3 --max-time=3600 --max-jobs=1000 --memory=256
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    networks:
      - llm_internal
    depends_on:
      - llm_mysql
      - llm_redis
      - llm_gateway
    env_file:
      - .env
    restart: unless-stopped

  llm_scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: llm_scheduler
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    networks:
      - llm_internal
    depends_on:
      - llm_mysql
      - llm_redis
      - llm_gateway
    env_file:
      - .env
    restart: unless-stopped

networks:
  llm_internal:
    driver: bridge
    ipam:
      config:
        - subnet: "10.10.1.0/24"

volumes:
  llm_mysql_data:
