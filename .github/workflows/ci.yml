name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  test:
    name: PHP ${{ matrix.php }} — tests + pint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_secret
          MYSQL_DATABASE: llm_gateway_test
          MYSQL_USER: llm_user
          MYSQL_PASSWORD: secret
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot_secret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_mysql, redis, bcmath, intl, fileinfo, openssl
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-all --no-check-publish

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Copy .env for tests
        run: cp .env.example .env

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Clear config cache
        run: php artisan config:clear

      - name: Run migrations (testing connection)
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3307
          DB_DATABASE: llm_gateway_test
          DB_USERNAME: llm_user
          DB_PASSWORD: secret
          APP_ENV: testing
        run: php artisan migrate --force

      - name: Run Pint (code style check)
        run: vendor/bin/pint --test

      - name: Run tests
        env:
          API_KEY_PEPPER: test-pepper-for-unit-tests
          CLAUDE_ALLOW_LEGACY_DROP: yes-i-confirm-data-loss-2026-05
        run: php artisan test
